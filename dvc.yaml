stages:
  prepare:
    cmd: uv run python src/stages/prepare.py data/dataset.csv data/prepared
    deps:
      - data/dataset.csv
      - src/stages/prepare.py
    outs:
      - data/prepared

  train:
    cmd: uv run python src/stages/train.py data/prepared data/models
    deps:
      - data/prepared
      - src/stages/train.py
    outs:
      - data/models
